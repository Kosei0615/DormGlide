<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: blob: https:;">
    <title>DormGlide - Student Marketplace</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">

    <!-- React and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Main Styles -->
    <link rel="stylesheet" href="styles/main.css?v=6">
    <link rel="stylesheet" href="styles/enhanced.css?v=3">
</head>
<body>
    <noscript>
        <div style="max-width:720px;margin:24px auto;padding:16px;border:1px solid #d1d5db;border-radius:10px;background:#f9fafb;color:#111827;font-family:Arial,sans-serif;">
            DormGlide requires JavaScript to load listings, chat, and account features. Please enable JavaScript and refresh this page.
        </div>
    </noscript>

    <div id="root"></div>

    <!-- Load utility scripts first -->
    <!-- Supabase credentials (update with your actual project values) -->
    <script>
        window.SUPABASE_URL = 'https://tmyjkucirpfquxostdhb.supabase.co';
        // Public key only (safe to ship in the browser). Do NOT use sb_secret keys in frontend code.
        window.SUPABASE_ANON_KEY = 'sb_publishable_8toJ2LmXCAbuxpn5AkOLTQ_S-CKZ355';
        // Auth mode: 'supabase' (production) | 'hybrid' (demo fallback) | 'local' (offline demo)
        window.DORMGLIDE_AUTH_MODE = 'supabase';
        // Optional: set to your backend/edge function URL to trigger email notifications for new chat messages.
        window.DORMGLIDE_NOTIFICATION_WEBHOOK_URL = '';
    </script>
    <script src="js/utils/supabaseClient.js?v=1"></script>
    <script src="js/utils/toast.js?v=1"></script>
    <script src="js/utils/storage.js?v=6"></script>
    <script src="js/utils/auth.js?v=5"></script>
    <script src="js/utils/chat.js?v=1"></script>
    <script src="js/utils/payments.js?v=1"></script>
    <script src="js/utils/sampleData.js?v=3"></script>

    <!-- Load components -->
    <script type="text/babel" src="js/components/Header.js?v=5"></script>
    <script type="text/babel" src="js/components/Footer.js?v=4"></script>
    <script type="text/babel" src="js/components/ProductCard.js?v=3"></script>
    <script type="text/babel" src="js/components/ProductGrid.js?v=3"></script>
    <script type="text/babel" src="js/components/SearchFilter.js?v=4"></script>
    <script type="text/babel" src="js/components/AuthModal.js?v=5"></script>
    <script type="text/babel" src="js/components/ChatModal.js?v=5"></script>
    <script type="text/babel" src="js/components/AdminPanel.js?v=3"></script>

    <!-- Load pages -->
    <script type="text/babel" src="js/pages/HomePage.js?v=4"></script>
    <script type="text/babel" src="js/pages/ProductDetailPage.js?v=9"></script>
    <script type="text/babel" src="js/pages/SellPage.js?v=6"></script>
    <script type="text/babel" src="js/pages/ProfilePage.js?v=5"></script>
    <script type="text/babel" src="js/pages/UserDashboard.js?v=8"></script>
    <script type="text/babel" src="js/pages/MessagesPage.js?v=2"></script>
    <script type="text/babel" src="js/pages/AdminDashboard.js?v=4"></script>
    <script type="text/babel" src="js/pages/HowItWorksPage.js?v=2"></script>
    <script type="text/babel" src="js/pages/PrivacyPolicyPage.js?v=2"></script>

    <!-- Load main app -->
    <script type="text/babel" src="js/App.js?v=6"></script>

    <script>
        console.log('DormGlide loaded successfully!');

        (async () => {
            const alertKey = 'dormglide_supabase_health_alert_shown';
            const authMode = String(window.DORMGLIDE_AUTH_MODE || 'hybrid').toLowerCase();

            if (authMode !== 'supabase') {
                return;
            }

            if (!window.SupabaseClient) {
                if (!sessionStorage.getItem(alertKey)) {
                    window.DormGlideToast?.error('A connection service failed to start. Please refresh and try again.');
                    sessionStorage.setItem(alertKey, 'true');
                }
                return;
            }

            try {
                const { error } = await window.SupabaseClient.auth.getSession();
                if (error) {
                    throw error;
                }
            } catch (error) {
                console.error('[DormGlide] Supabase startup health check failed:', error);
                if (!sessionStorage.getItem(alertKey)) {
                    window.DormGlideToast?.warning('We could not verify the live connection. Some features may be unavailable right now.');
                    sessionStorage.setItem(alertKey, 'true');
                }
            }
        })();

        // Demo credential seeding must only run in a local development script, never in production HTML.
    </script>
</body>
</html>
